<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page"></title>

<link rel="icon" href="/src/icon.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
:root{
--primary:linear-gradient(135deg,#667eea,#764ba2);
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--text:#e2e8f0;
--accent:#00f5ff;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* particles */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* grid */
#apiContent{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* cards */
.api-category{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
overflow:hidden;
transition:.3s;
backdrop-filter:blur(20px);
}

.api-category:hover{
transform:translateY(-5px);
border-color:var(--accent);
}

.api-category-header{
padding:15px;
background:var(--primary);
display:flex;
justify-content:space-between;
cursor:pointer;
}

.api-category-content{
padding:10px;
display:grid;
gap:10px;
}

.api-endpoint-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
padding:10px;
display:flex;
gap:10px;
align-items:center;
cursor:pointer;
transition:.3s;
}

.api-endpoint-card:hover{
background:rgba(102,126,234,0.2);
border-color:var(--accent);
transform:translateX(5px);
}

/* badge */
.method-badge{
background:#00ff88;
color:black;
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

/* counter */
.endpoints-counter{
margin-top:10px;
background:rgba(0,255,136,0.1);
border:1px solid #00ff88;
color:#00ff88;
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:flex;
gap:5px;
width:fit-content;
}

/* modal */
.modal-content{
background:#0f172a;
color:white;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container mt-4">

<h1 id="name"></h1>
<p id="description"></p>

<div class="search-box">
<input type="text" id="searchInput" class="form-control" placeholder="ابحث في API">

<div class="endpoints-counter" id="endpointsCounter" style="display:none;">
<i class="fas fa-code"></i>
<span id="totalEndpoints">0</span> APIs
</div>
</div>

<div id="apiContent"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="apiResponseModal">
<div class="modal-dialog modal-xl">
<div class="modal-content">

<div class="modal-header">
<h5 id="apiResponseModalLabel"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<span class="method-badge">GET</span>
<span id="modalEndpointPath"></span>

<div id="apiQueryInputContainer"></div>

<button id="submitQueryBtn" class="btn btn-primary mt-2">Execute</button>
<button id="clearQueryBtn" class="btn btn-outline mt-2">Clear</button>

<pre id="apiCurlContent"></pre>
<pre id="apiRequestUrlContent"></pre>

<pre id="apiResponseCode"></pre>
<pre id="apiResponseBody"></pre>
<pre id="apiResponseHeaders"></pre>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
const BASEURL = window.location.origin

document.addEventListener("DOMContentLoaded", async () => {

particlesJS("particles-js",{
particles:{number:{value:60},color:{value:"#6c5ce7"},line_linked:{enable:true}}
})

const settings = await fetch(BASEURL+"/src/settings.json").then(r=>r.json())

document.getElementById("name").textContent=settings.name
document.getElementById("description").textContent=settings.description

const apiContent=document.getElementById("apiContent")

let total=0

settings.categories.forEach(cat=>{
total+=cat.items.length

const div=document.createElement("div")
div.className="api-category"

const header=document.createElement("div")
header.className="api-category-header"
header.innerHTML=`${cat.name} <i class="fas fa-chevron-down"></i>`

const body=document.createElement("div")
body.className="api-category-content"
body.style.display="none"

cat.items.forEach(item=>{
const card=document.createElement("div")
card.className="api-endpoint-card"

card.innerHTML=`
<span class="method-badge">GET</span>
<div>
<div>${item.name}</div>
<small>${item.path}</small>
</div>
`

card.onclick=()=>{
openModal(item)
}

body.appendChild(card)
})

header.onclick=()=>{
body.style.display=body.style.display==="none"?"grid":"none"
}

div.appendChild(header)
div.appendChild(body)

apiContent.appendChild(div)
})

document.getElementById("totalEndpoints").textContent=total
document.getElementById("endpointsCounter").style.display="flex"

})

function openModal(item){

const modal=new bootstrap.Modal(document.getElementById("apiResponseModal"))

document.getElementById("apiResponseModalLabel").textContent=item.name
document.getElementById("modalEndpointPath").textContent=item.path

document.getElementById("submitQueryBtn").onclick=async ()=>{

// 🔥 افتح response قبل الريكوست
document.getElementById("apiResponseCode").textContent="Loading..."
document.getElementById("apiResponseBody").textContent="Loading..."

const res=await fetch(BASEURL+item.path)
const data=await res.json()

document.getElementById("apiResponseCode").textContent=res.status
document.getElementById("apiResponseBody").textContent=JSON.stringify(data,null,2)

}

modal.show()
}
</script>

</body>
</html>
