<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title id="page"></title>

<link rel="icon" href="/src/icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

/* GRID بدل الاكورديون */
#apiContent{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

/* الكارت */
.api-category{
  background:linear-gradient(180deg,#1a1f35,#14182b);
  border-radius:16px;
  padding:15px;
  border:1px solid #2a2f4a;
}

/* العنوان */
.api-category-header{
  font-weight:600;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:default;
}

.api-category-header i{
  display:none; /* نشيل السهم */
}

/* المحتوى يبقى ظاهر دايماً */
.api-category-content{
  display:flex !important;
  flex-direction:column;
  gap:8px;
}

/* endpoint */
.api-endpoint-card{
  background:#22274a;
  padding:10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:.2s;
}

.api-endpoint-card:hover{
  background:#2c3270;
}

.method-badge{
  background:#6c5ce7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.endpoint-text{
  flex:1;
  margin:0 10px;
}

</style>
</head>

<body>

<div class="container mt-4">
  <h1 id="name"></h1>
  <p id="description"></p>

  <input id="searchInput" class="form-control mb-3" placeholder="Search API">

  <div id="apiContent"></div>
</div>

<!-- 🔥 المودال زي ما انت طالب بالظبط -->
<div class="modal fade" id="apiResponseModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-xl">
<div class="modal-content">

<div class="modal-header">
<div>
<h5 id="apiResponseModalLabel"></h5>
<p id="apiResponseModalDesc"></p>
</div>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="endpoint-info">
<span class="method-badge">GET</span>
<span id="modalEndpointPath"></span>
</div>

<p id="modalApiDescription"></p>

<div class="tab-buttons">
<button class="tab-button active" data-tab="parameters">Parameters</button>
<button class="tab-button" data-tab="responses">Responses</button>
</div>

<div class="tab-content-wrapper">

<div id="parametersTab" class="tab-pane active">
<div id="apiQueryInputContainer"></div>

<div class="action-buttons">
<button id="submitQueryBtn" class="btn btn-primary">Execute</button>
<button id="clearQueryBtn" class="btn btn-outline">Clear</button>
</div>
</div>

<div id="responsesTab" class="tab-pane">

<div>
<h6>Curl</h6>
<pre id="apiCurlContent"></pre>
</div>

<div>
<h6>Request URL</h6>
<pre id="apiRequestUrlContent"></pre>
</div>

<div>
<h6>Response</h6>
<pre id="apiResponseCode"></pre>
<pre id="apiResponseBody"></pre>
<pre id="apiResponseHeaders"></pre>
</div>

</div>

</div>
</div>

</div>
</div>
</div>

<!-- نفس الاستيراد -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/script.js"></script>

</body>
</html>
