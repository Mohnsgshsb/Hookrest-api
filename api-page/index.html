<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookrest API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #12121f;
            --bg-card: #1a1a2e;
            --bg-hover: #24243d;
            --accent: #6366f1;
            --accent-hover: #4f52e0;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(99, 102, 241, 0.2);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar-width: 280px;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed; 
            inset: 0; 
            z-index: 9999;
            background: var(--bg-primary);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loading-screen.hidden { 
            opacity: 0; 
            pointer-events: none; 
        }
        .loader-ring {
            width: 56px; 
            height: 56px;
            border: 4px solid rgba(99, 102, 241, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        .loading-text {
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        /* ===== PARTICLES ===== */
        #particles-js {
            position: fixed; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            z-index: 0; 
            pointer-events: none;
            opacity: 0.6;
        }

        /* ===== LAYOUT ===== */
        .app-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(18, 18, 31, 0.97);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0; 
            top: 0; 
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
        }
        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-brand {
            display: flex; 
            align-items: center; 
            gap: 14px;
        }
        .sidebar-brand-icon {
            width: 42px; 
            height: 42px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.35rem;
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .sidebar-brand-text {
            font-weight: 700; 
            font-size: 1.25rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .sidebar-brand-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .sidebar-search {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .search-box i {
            position: absolute;
            left: 16px; 
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .sidebar-nav::-webkit-scrollbar { 
            width: 5px; 
        }
        .sidebar-nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .nav-category {
            margin-bottom: 2px;
        }
        .nav-category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            border-radius: 0 8px 8px 0;
        }
        .nav-category-header:hover { 
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .nav-category-header i {
            font-size: 0.85rem;
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .nav-category-header.collapsed i { 
            transform: rotate(-90deg); 
        }

        .nav-items {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px 10px 40px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid transparent;
            text-decoration: none;
            border-radius: 0 8px 8px 0;
        }
        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.08);
            border-left-color: var(--accent);
        }
        .nav-item.active {
            color: var(--accent);
            background: rgba(99, 102, 241, 0.12);
            border-left-color: var(--accent);
        }
        .nav-item .method-badge-mini {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            font-weight: 700;
        }
        .nav-item .nav-endpoint-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            padding: 32px 40px;
            max-width: calc(100% - var(--sidebar-width));
            position: relative;
        }

        /* ===== DASHBOARD HERO / STATS ===== */
        .dashboard-header {
            margin-bottom: 40px;
        }
        .dashboard-title {
            font-size: 2.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4d0ff, var(--accent), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .dashboard-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 520px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: var(--accent);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, var(--accent), #a5b4fc);
            opacity: 0.6;
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
        .stat-value {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-trend {
            font-size: 0.8rem;
            color: var(--success);
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== CATEGORY SECTIONS ===== */
        .category-section {
            margin-bottom: 52px;
            scroll-margin-top: 80px;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .category-icon {
            width: 52px; 
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 16px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.35rem;
            color: white;
            box-shadow: 0 10px 15px -3px rgb(99 102 241 / 0.3);
        }
        .category-title {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.4px;
        }
        .category-count {
            margin-left: auto;
            font-size: 0.85rem;
            padding: 6px 16px;
            background: var(--bg-hover);
            border-radius: 9999px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ===== ENDPOINT CARDS ===== */
        .endpoint-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 20px;
            transition: all 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .endpoint-card::before {
            content: '';
            position: absolute;
            left: 0; 
            top: 0; 
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--accent), #a5b4fc);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .endpoint-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        .endpoint-card:hover::before { 
            opacity: 1; 
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .method-badge {
            padding: 7px 16px;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .method-get { 
            background: rgba(34, 197, 94, 0.12); 
            color: var(--success); 
        }

        .endpoint-path {
            font-family: ui-monospace, 'SF Mono', monospace;
            font-size: 0.97rem;
            color: var(--text-primary);
            font-weight: 500;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px 12px;
            border-radius: 8px;
        }
        .endpoint-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .endpoint-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 20px;
        }

        .endpoint-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .endpoint-tags {
            display: flex; 
            gap: 8px;
        }
        .endpoint-tag {
            font-size: 0.78rem;
            padding: 5px 12px;
            background: var(--bg-hover);
            border-radius: 9999px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .btn-try {
            padding: 10px 26px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-try:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 15px var(--accent-glow);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; 
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { 
            display: flex; 
        }
        .modal-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 820px;
            max-height: 92vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from { 
                opacity: 0; 
                transform: scale(0.92) translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
        }

        /* Other modal styles remain similar but refined */
        .modal-header {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title {
            font-size: 1.35rem;
            font-weight: 700;
        }
        .modal-close {
            width: 40px; 
            height: 40px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.1rem;
        }
        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        /* Keep other modal styles but update padding and colors as needed */
        .modal-body {
            padding: 28px 32px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-section {
            margin-bottom: 28px;
        }
        .modal-section-title {
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .modal-url-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
            color: var(--accent);
            word-break: break-all;
        }

        /* ... (keeping remaining modal, toast, responsive styles with improvements) ... */
        .modal-params {
            display: grid;
            gap: 16px;
        }
        .param-field {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 22px;
        }
        .param-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .param-field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .param-field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .code-block {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            font-family: ui-monospace, monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            position: relative;
        }

        .response-body {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            min-height: 140px;
            max-height: 420px;
            overflow-y: auto;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.25s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #818cf8);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 24px; 
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 300px;
        }
        .toast.show { 
            transform: translateX(0); 
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open { 
                transform: translateX(0); 
            }
            .main-content {
                margin-left: 0;
                padding: 24px 20px;
            }
            .sidebar-toggle { 
                display: flex; 
            }
            .dashboard-title { 
                font-size: 2.25rem; 
            }
        }
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .endpoint-card {
                padding: 22px;
            }
        }

        /* Scrollbar & Animations */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .fade-in {
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loading-text">INITIALIZING DASHBOARD...</div>
</div>

<!-- Particles -->
<div id="particles-js"></div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Mobile Toggle -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" style="display:none; position:fixed; bottom:24px; right:24px; width:56px; height:56px; background:linear-gradient(135deg,var(--accent),#818cf8); border:none; border-radius:50%; color:white; font-size:1.4rem; cursor:pointer; box-shadow:0 10px 15px var(--accent-glow); z-index:999;">
    <i class="fas fa-bars"></i>
</button>

<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon"><i class="fas fa-plug"></i></div>
                <div>
                    <div class="sidebar-brand-text" id="sidebarBrand">Hookrest</div>
                    <div class="sidebar-brand-desc" id="sidebarDesc">API Platform</div>
                </div>
            </div>
        </div>
        <div class="sidebar-search">
            <div class="search-box">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="sidebarSearch" placeholder="Search APIs...">
            </div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            © <span id="footerYear"></span> Hookrest API
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent">
        <div class="dashboard-header">
            <h1 class="dashboard-title" id="heroTitle">API Dashboard</h1>
            <p class="dashboard-subtitle" id="heroDesc">Explore, test, and integrate powerful endpoints</p>
        </div>

        <!-- Stats Dashboard -->
        <div class="stats-grid" id="statsGrid"></div>

        <div id="categoriesContainer"></div>
    </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="apiModal">
    <div class="modal-box">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modalTitle"></div>
                <div id="modalDesc" style="color:var(--text-secondary);margin-top:6px;font-size:0.95rem;"></div>
            </div>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <!-- Modal content same as before, with refined classes -->
            <div class="modal-section">
                <div class="modal-section-title">Endpoint URL</div>
                <div class="modal-url-box" id="modalUrl"></div>
            </div>
            <div class="modal-section" id="paramsSection">
                <div class="modal-section-title">Query Parameters</div>
                <div class="modal-params" id="modalParams"></div>
            </div>
            <div class="modal-section" id="responseSection" style="display:none;">
                <div class="modal-section-title">Live Response</div>
                <div class="response-status" id="responseStatus"></div>
                <div class="modal-tabs">
                    <button class="modal-tab active" onclick="switchResponseTab('body')">Response Body</button>
                    <button class="modal-tab" onclick="switchResponseTab('headers')">Headers</button>
                    <button class="modal-tab" onclick="switchResponseTab('curl')">cURL</button>
                </div>
                <div id="tabBody">
                    <div class="response-body" id="responseBody"></div>
                </div>
                <div id="tabHeaders" style="display:none;">
                    <div class="code-block"><div class="copy-btn" onclick="copyResponseHeaders()">Copy</div><pre id="responseHeaders"></pre></div>
                </div>
                <div id="tabCurl" style="display:none;">
                    <div class="code-block"><div class="copy-btn" onclick="copyCurl()">Copy</div><pre id="curlCommand"></pre></div>
                </div>
            </div>
        </div>
        <div class="modal-actions" style="padding:24px 32px; border-top:1px solid var(--border); display:flex; gap:12px;">
            <button class="btn-primary" id="btnExecute" onclick="executeApi()">
                <i class="fas fa-paper-plane"></i> Execute Request
            </button>
            <button class="btn-secondary" id="btnClear" onclick="clearParams()" style="display:none;">Clear</button>
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
const BASEURL = window.location.origin;
let currentApiUrl = '';
let currentApiName = '';
let currentParams = {};
let settingsData = null;
let activeCategory = null;

// Particles config - slightly optimized
particlesJS('particles-js', {
    particles: {
        number: { value: 45, density: { enable: true, value_area: 900 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true },
        size: { value: 2.5, random: true },
        line_linked: { enable: true, distance: 130, color: '#6366f1', opacity: 0.18, width: 1 },
        move: { enable: true, speed: 0.8, direction: 'none', random: false, straight: false }
    },
    interactivity: {
        detect_on: 'canvas',
        events: { 
            onhover: { enable: true, mode: 'grab' }, 
            onclick: { enable: true, mode: 'push' }, 
            resize: true 
        }
    }
});

// INIT
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    try {
        const res = await fetch(BASEURL + '/src/settings.json');
        settingsData = await res.json();
        renderApp(settingsData);
    } catch (e) {
        console.error('Settings load failed:', e);
        showToast('Could not load API configuration. Using demo data.', 'error');
        // Fallback if needed
        renderApp({name: "Hookrest API", categories: []});
    } finally {
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
        }, 800);
    }
});

function renderApp(settings) {
    const name = settings.name || 'Hookrest API';
    document.getElementById('sidebarBrand').textContent = name;
    document.getElementById('heroTitle').textContent = name;

    const totalEndpoints = settings.categories.reduce((sum, cat) => sum + cat.items.length, 0);
    
    document.getElementById('heroDesc').textContent = settings.description || 'Modern API Hub';

    renderStats(settings, totalEndpoints);
    renderSidebar(settings.categories);
    renderMainContent(settings.categories);

    // Search listener
    const searchInput = document.getElementById('sidebarSearch');
    searchInput.addEventListener('input', debounce((e) => {
        filterEndpoints(e.target.value.toLowerCase());
    }, 180));
}

// New dashboard stats
function renderStats(settings, total) {
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = '';

    const catCount = settings.categories.length;

    // Total APIs Card
    const card1 = createStatCard('fas fa-plug', total, 'Total Endpoints', '#22c55e');
    grid.appendChild(card1);

    // Categories
    const card2 = createStatCard('fas fa-layer-group', catCount, 'Categories', '#6366f1');
    grid.appendChild(card2);

    // Example additional stat - can be extended
    const card3 = createStatCard('fas fa-clock', '99.9', 'Avg Response', '#eab308');
    grid.appendChild(card3);

    // Dynamic category breakdown summary
    const breakdownHTML = settings.categories.map(cat => `
        <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-top:4px;">
            <span>${cat.name}</span>
            <span style="color:var(--success)">${cat.items.length}</span>
        </div>
    `).join('');
    
    const summaryCard = document.createElement('div');
    summaryCard.className = 'stat-card';
    summaryCard.innerHTML = `
        <div class="stat-icon"><i class="fas fa-chart-pie"></i></div>
        <div class="stat-value">${total}</div>
        <div class="stat-label">DISTRIBUTION</div>
        <div style="margin-top:16px; font-size:0.85rem; line-height:1.5; color:var(--text-secondary);">
            ${breakdownHTML}
        </div>
    `;
    grid.appendChild(summaryCard);
}

function createStatCard(icon, value, label, color = 'var(--accent)') {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `
        <div class="stat-icon" style="color:${color}"><i class="${icon}"></i></div>
        <div class="stat-value">${value}</div>
        <div class="stat-label">${label}</div>
    `;
    return card;
}

// Sidebar with accordion (close others)
function renderSidebar(categories) {
    const nav = document.getElementById('sidebarNav');
    nav.innerHTML = '';

    categories.forEach((cat, catIdx) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'nav-category';

        const header = document.createElement('div');
        header.className = 'nav-category-header collapsed';
        header.innerHTML = `
            <span>${cat.name}</span>
            <i class="fas fa-chevron-down"></i>
        `;
        
        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'nav-items';
        itemsDiv.style.maxHeight = '0px';

        cat.items.sort((a, b) => a.name.localeCompare(b.name)).forEach(item => {
            const navItem = document.createElement('a');
            navItem.className = 'nav-item';
            navItem.href = `#cat-${catIdx}`;
            navItem.innerHTML = `
                <span class="method-badge-mini">GET</span>
                <span class="nav-endpoint-name">${item.name}</span>
            `;
            navItem.onclick = (e) => {
                e.preventDefault();
                document.getElementById(`cat-${catIdx}`).scrollIntoView({ behavior: 'smooth' });
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                navItem.classList.add('active');
                if (window.innerWidth <= 1024) toggleSidebar();
            };
            itemsDiv.appendChild(navItem);
        });

        header.onclick = () => {
            toggleAccordion(header, itemsDiv, catIdx);
        };

        catDiv.append(header, itemsDiv);
        nav.appendChild(catDiv);
    });
}

function toggleAccordion(header, itemsDiv, catIdx) {
    const isCollapsed = header.classList.contains('collapsed');
    
    // Close all others
    document.querySelectorAll('.nav-category-header').forEach(h => {
        if (h !== header) {
            h.classList.add('collapsed');
            const siblingItems = h.nextElementSibling;
            if (siblingItems) siblingItems.style.maxHeight = '0px';
        }
    });

    if (isCollapsed) {
        header.classList.remove('collapsed');
        itemsDiv.style.maxHeight = itemsDiv.scrollHeight + 'px';
    } else {
        header.classList.add('collapsed');
        itemsDiv.style.maxHeight = '0px';
    }
}

// Main content render - improved
function renderMainContent(categories) {
    const container = document.getElementById('categoriesContainer');
    container.innerHTML = '';

    const categoryIcons = { /* same as before */ 
        'download': 'fa-download', 'ai': 'fa-robot', /* ... */ 'default': 'fa-cube'
    };

    categories.forEach((cat, catIdx) => {
        const section = document.createElement('section');
        section.className = 'category-section fade-in';
        section.id = `cat-${catIdx}`;

        const catKey = cat.name.toLowerCase().trim();
        const iconClass = categoryIcons[catKey] || categoryIcons['default'];

        const sortedItems = [...cat.items].sort((a, b) => a.name.localeCompare(b.name));

        section.innerHTML = `
            <div class="category-header">
                <div class="category-icon"><i class="fas ${iconClass}"></i></div>
                <div>
                    <h2 class="category-title">${cat.name}</h2>
                </div>
                <span class="category-count">${sortedItems.length} endpoints</span>
            </div>
            <div class="endpoints-list" id="endpoints-${catIdx}"></div>
        `;

        container.appendChild(section);

        const listEl = section.querySelector('.endpoints-list');
        
        sortedItems.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'endpoint-card fade-in';
            card.style.animationDelay = `${idx * 0.04}s`;
            card.dataset.name = item.name.toLowerCase();
            card.dataset.path = item.path.toLowerCase();

            const hasParams = item.path.includes('?');
            const tagsHTML = hasParams ? 
                `<span class="endpoint-tag">Params</span><span class="endpoint-tag">GET</span>` : 
                `<span class="endpoint-tag">GET</span>`;

            card.innerHTML = `
                <div class="endpoint-header">
                    <span class="method-badge method-get">GET</span>
                    <span class="endpoint-path">${item.path.split('?')[0]}</span>
                </div>
                <div class="endpoint-name">${item.name}</div>
                <div class="endpoint-desc">${item.desc || 'No description provided.'}</div>
                <div class="endpoint-footer">
                    <div class="endpoint-tags">${tagsHTML}</div>
                    <button class="btn-try" onclick="openTryModal('${item.path}', '${item.name}', '${item.desc || ''}', '${item.innerDesc || ''}')">
                        <i class="fas fa-bolt"></i> Test Endpoint
                    </button>
                </div>
            `;
            listEl.appendChild(card);
        });
    });
}

function filterEndpoints(term) {
    let hasVisible = false;
    
    document.querySelectorAll('.endpoint-card').forEach(card => {
        const matches = card.dataset.name.includes(term) || card.dataset.path.includes(term);
        card.style.display = matches ? 'block' : 'none';
        if (matches) hasVisible = true;
    });

    document.querySelectorAll('.category-section').forEach(section => {
        const visibleInCat = Array.from(section.querySelectorAll('.endpoint-card')).some(c => c.style.display !== 'none');
        section.style.display = visibleInCat ? 'block' : 'none';
    });
}

// Debounce helper
function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

// Modal functions - minor refinements but core logic same
function openTryModal(path, name, desc, innerDesc) {
    currentApiUrl = BASEURL + path.split('?')[0];
    currentApiName = name;
    currentParams = {};

    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalDesc').textContent = desc;
    document.getElementById('modalUrl').textContent = currentApiUrl;

    const paramsDiv = document.getElementById('modalParams');
    paramsDiv.innerHTML = '';

    const urlParams = new URLSearchParams(path.split('?')[1] || '');
    const hasParams = urlParams.toString().length > 0;

    document.getElementById('paramsSection').style.display = hasParams ? 'block' : 'none';
    document.getElementById('btnClear').style.display = hasParams ? 'inline-flex' : 'none';

    if (hasParams) {
        urlParams.forEach((_, key) => {
            const field = document.createElement('div');
            field.className = 'param-field';
            field.innerHTML = `
                <label>${capitalize(key)} <span style="color:var(--danger)">*</span></label>
                <input type="text" data-param="${key}" placeholder="Value for ${key}" oninput="updateParam('${key}', this.value)">
                <small style="color:var(--text-muted);display:block;margin-top:6px;">Required parameter</small>
            `;
            paramsDiv.appendChild(field);
        });
        
        if (innerDesc) {
            const note = document.createElement('div');
            note.style = 'background:rgba(99,102,241,0.08);padding:14px;border-radius:12px;margin-top:12px;color:var(--text-secondary);font-size:0.9rem;';
            note.innerHTML = innerDesc.replace(/\n/g, '<br>');
            paramsDiv.appendChild(note);
        }
    }

    // Reset response
    document.getElementById('responseSection').style.display = 'none';
    document.getElementById('responseBody').innerHTML = `<div style="text-align:center; padding:60px 20px; color:var(--text-muted);"><i class="fas fa-info-circle" style="font-size:2.5rem;opacity:0.4;"></i><p style="margin-top:16px;">Hit Execute to test this endpoint</p></div>`;
    
    document.getElementById('apiModal').classList.add('active');
    document.body.style.overflow = 'hidden';

    updateCurl();
}

function closeModal() {
    document.getElementById('apiModal').classList.remove('active');
    document.body.style.overflow = '';
}

function updateParam(key, value) {
    currentParams[key] = value.trim();
    updateCurl();
}

function updateCurl() {
    const paramsStr = new URLSearchParams(currentParams).toString();
    const fullUrl = currentApiUrl + (paramsStr ? '?' + paramsStr : '');
    const curlEl = document.getElementById('curlCommand');
    if (curlEl) {
        curlEl.textContent = `curl -X GET "${fullUrl}" \\\n  -H "Accept: */*"`;
    }
}

function clearParams() {
    currentParams = {};
    document.querySelectorAll('#modalParams input').forEach(i => i.value = '');
    updateCurl();
}

async function executeApi() {
    // ... (keep the original logic with minor toast and loading enhancements)
    const params = new URLSearchParams(currentParams);
    const fullUrl = currentApiUrl + (params.toString() ? '?' + params.toString() : '');

    const inputs = document.querySelectorAll('#modalParams input');
    let valid = true;
    inputs.forEach(inp => {
        if (!inp.value.trim()) {
            valid = false;
            inp.style.borderColor = 'var(--danger)';
            setTimeout(() => { inp.style.borderColor = ''; }, 1800);
        }
    });
    if (!valid) {
        showToast('Please provide all required parameters', 'error');
        return;
    }

    const statusEl = document.getElementById('responseStatus');
    const bodyEl = document.getElementById('responseBody');
    
    document.getElementById('responseSection').style.display = 'block';
    statusEl.className = 'response-status status-loading';
    statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Fetching response...`;
    bodyEl.innerHTML = `<div style="text-align:center;padding:80px;"><i class="fas fa-circle-notch fa-spin" style="font-size:2rem;color:var(--accent);"></i></div>`;

    switchResponseTab('body');

    try {
        const response = await fetch(fullUrl, { cache: 'no-cache' });
        // ... rest of original execute logic stays intact ...
        const headersObj = {};
        response.headers.forEach((v, k) => headersObj[k] = v);
        
        document.getElementById('responseHeaders').textContent = Object.entries(headersObj).map(([k,v]) => `${k}: ${v}`).join('\n');

        if (response.ok) {
            statusEl.className = 'response-status status-success';
            statusEl.innerHTML = `<i class="fas fa-check"></i> ${response.status} Success`;
        } else {
            statusEl.className = 'response-status status-error';
            statusEl.innerHTML = `<i class="fas fa-triangle-exclamation"></i> ${response.status} Error`;
        }

        const ct = response.headers.get('content-type') || '';
        if (ct.includes('image')) {
            // blob handling...
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            bodyEl.innerHTML = `<img src="${url}" style="max-width:100%; border-radius:12px;" alt="response">`;
        } else if (ct.includes('json')) {
            const data = await response.json();
            bodyEl.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
            const text = await response.text();
            bodyEl.textContent = text || 'Empty response body';
        }
    } catch (err) {
        statusEl.className = 'response-status status-error';
        statusEl.innerHTML = `<i class="fas fa-xmark"></i> Request Failed`;
        bodyEl.textContent = `Network Error: ${err.message}`;
    }
}

function switchResponseTab(tab) {
    // standard tab switcher
    document.querySelectorAll('.modal-tab').forEach((t, i) => {
        t.classList.toggle('active', 
            (tab === 'body' && i === 0) || 
            (tab === 'headers' && i === 1) || 
            (tab === 'curl' && i === 2)
        );
    });
    document.getElementById('tabBody').style.display = tab === 'body' ? 'block' : 'none';
    document.getElementById('tabHeaders').style.display = tab === 'headers' ? 'block' : 'none';
    document.getElementById('tabCurl').style.display = tab === 'curl' ? 'block' : 'none';
}

// Copy functions
function copyCurl() {
    const text = document.getElementById('curlCommand').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('cURL command copied', 'success'));
}
function copyResponseHeaders() {
    const text = document.getElementById('responseHeaders').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('Headers copied to clipboard', 'success'));
}

// Toast
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type === 'error' ? 'toast-error' : 'toast-success'}`;
    toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} toast-icon"></i>
        <span class="toast-message">${message}</span>
        <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(toast);
    
    requestAnimationFrame(() => toast.classList.add('show'));
    
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
    }, 3400);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function capitalize(str) {
    return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
}

// Modal overlay close
document.getElementById('apiModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Keyboard support
document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
        const modal = document.getElementById('apiModal');
        if (modal.classList.contains('active')) closeModal();
    }
});
</script>
</body>
</html>
