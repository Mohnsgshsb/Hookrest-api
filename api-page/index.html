<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page"></title>

<link rel="icon" href="/src/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg:#0f1221;
  --card:#1a1f35;
  --border:#2a2f4a;
  --primary:#7c6cff;
  --text:#eaeaff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle at top,#1a1f35,#0f1221);
  color:var(--text);
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
}

.header img{
  width:70px;
  border-radius:20px;
  margin-bottom:10px;
}

.header h1{
  font-size:28px;
  font-weight:700;
}

.header p{
  opacity:.7;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}

.stat{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  width:100px;
  text-align:center;
}

.stat span{
  font-size:20px;
  color:var(--primary);
  font-weight:600;
}

/* SEARCH */
.search{
  max-width:600px;
  margin:30px auto;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1f2440;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:linear-gradient(180deg,#1a1f35,#14182b);
  border-radius:16px;
  padding:15px;
  border:1px solid var(--border);
}

.card h3{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  font-size:16px;
}

.card h3 i{
  background:var(--primary);
  padding:8px;
  border-radius:10px;
}

/* ENDPOINT */
.endpoint{
  background:#22274a;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  transition:.2s;
}

.endpoint:hover{
  background:#2c3270;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0009;
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#1a1f35;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:600px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="/src/icon.png">
  <h1 id="name"></h1>
  <p id="description"></p>

  <div class="stats">
    <div class="stat"><span id="totalApis">0</span><br>APIs</div>
    <div class="stat"><span id="totalCat">0</span><br>Categories</div>
    <div class="stat"><span>24/7</span><br>Uptime</div>
  </div>
</div>

<div class="search">
  <input id="search" placeholder="Search API...">
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="apiName"></h3>
    <p id="apiDesc"></p>

    <input id="paramInput" placeholder="Enter parameter">
    <button onclick="sendRequest()">Execute</button>

    <pre id="result"></pre>
  </div>
</div>

<script>
const BASEURL = window.location.origin

let currentAPI = ""

fetch("/src/settings.json")
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText = data.name
document.getElementById("description").innerText = data.description

document.getElementById("totalCat").innerText = data.categories.length

let total = 0
const grid = document.getElementById("grid")

data.categories.forEach(cat=>{
  total += cat.items.length

  const card = document.createElement("div")
  card.className = "card"

  card.innerHTML = `<h3><i class="fas fa-code"></i>${cat.name}</h3>`

  cat.items.forEach(api=>{
    const el = document.createElement("div")
    el.className = "endpoint"
    el.innerHTML = `<span>${api.name}</span><span>→</span>`

    el.onclick = ()=>{
      currentAPI = api.path
      document.getElementById("modal").style.display="flex"
      document.getElementById("apiName").innerText = api.name
      document.getElementById("apiDesc").innerText = api.desc
    }

    card.appendChild(el)
  })

  grid.appendChild(card)
})

document.getElementById("totalApis").innerText = total

})

function sendRequest(){
  const param = document.getElementById("paramInput").value
  const url = BASEURL + currentAPI + (param ? "?query="+param : "")

  fetch(url)
  .then(res=>res.text())
  .then(res=>{
    document.getElementById("result").innerText = res
  })
}

document.getElementById("search").oninput = function(){
  const val = this.value.toLowerCase()
  document.querySelectorAll(".endpoint").forEach(e=>{
    e.style.display = e.innerText.toLowerCase().includes(val) ? "flex" : "none"
  })
}
</script>

</body>
</html>
